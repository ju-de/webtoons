<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#c4c0ee" />
    <title>兔n</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Silkscreen:wght@400;700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div id="readonly-banner">view only — <button id="readonly-connect-btn">connect github to edit</button></div>
    <main class="shell">
      <header class="topbar">
        <a class="brand" href="#top" aria-label="兔n home"><span class="brand-stamp"><span class="stamp-top">兔</span><span class="stamp-bot">n</span></span></a>
      </header>

      <section class="hero" id="top">

        <form class="search-panel" id="search-form">
          <label for="title-search">Click a site below to search, press Enter to search the web</label>
          <div class="search-row">
            <input id="title-search" name="title" type="search" placeholder="search a title or author…" autocomplete="off" />
          </div>
          <div class="search-results" id="search-results"></div>
        </form>
      </section>

      <p class="eyebrow">favorites</p>
      <section class="discover">
        <div id="favorites-list"></div>
      </section>

      <section class="section-heading">
        <p class="eyebrow">library</p>
        <div class="shelf-actions">
          <label class="import-btn" for="import-file">↑ import</label>
          <input type="file" id="import-file" accept=".json" hidden />
          <button class="import-btn" id="export-btn" type="button">↓ export</button>
          <button class="import-btn" id="gh-btn" type="button">○ github</button>
          <button class="import-btn" id="preview-ro-btn" type="button" title="Toggle view-only preview">○ preview</button>
        </div>
      </section>
      <div id="gh-token-row" class="gh-token-row" hidden>
        <input id="gh-token-input" class="gh-input" type="password" placeholder="GitHub token (ghp_…)" autocomplete="off" />
        <button id="gh-token-save" class="gh-connect" type="button">save &amp; sync</button>
      </div>

      <div class="library-filter">
        <input id="library-search" type="search" placeholder="type to filter, or paste a link to get the title; press enter to add a new webtoon…" autocomplete="off" />
      </div>
      <div class="filters" role="group" aria-label="Filter your library">
        <button class="filter active" data-filter="all" type="button">All <span id="all-total">0</span></button>
        <button class="filter" data-filter="reading" type="button">Reading <span id="reading-total">0</span></button>
        <button class="filter" data-filter="queue" type="button">Queue <span id="queue-total">0</span></button>
        <button class="filter" data-filter="complete" type="button">Complete <span id="complete-total">0</span></button>
        <select id="sort-select" class="sort-select" aria-label="Sort order">
          <option value="updated-desc">↓ recent</option>
          <option value="updated-asc">↑ recent</option>
          <option value="alpha-asc">a → z</option>
          <option value="alpha-desc">z → a</option>
        </select>
      </div>
      <section class="library" id="library" aria-live="polite"></section>

    </main>

    <template id="toon-template">
      <article class="toon-card">
        <div class="toon-details"><div class="title-wrap"><span class="title-h3"></span><span class="verified-badge" hidden>✓</span></div><div class="card-controls"><button class="fav-btn" type="button" aria-label="Toggle favorite">☆</button><select class="status-select" aria-label="Reading status"><option value="reading">Reading</option><option value="queue">Queue</option><option value="complete">Complete</option></select><label class="chapter-label">Ch. <input class="chapter-input" type="number" min="0" /></label><button class="delete" type="button" aria-label="Remove title">×</button></div><div class="toon-meta-row"><p class="toon-alts-line"></p><span class="toon-updated"></span></div></div>
        <div class="toon-notes" hidden><div class="alts-editor"><div class="alts-tags"></div><div class="alts-input-row"><input class="alt-input" type="text" placeholder="add alt title…" autocomplete="off" /><button class="alt-add-btn" type="button">+</button></div></div><textarea class="notes-input" placeholder="notes…"></textarea></div>
      </article>
    </template>

    <footer>兔n</footer>
    <script src="app.js"></script>
  </body>
</html>
