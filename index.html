<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#c4c0ee" />
    <title>兔n — your next webtoon</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Silkscreen:wght@400;700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <a class="brand" href="#top" aria-label="兔n home"><span class="brand-mark">兔</span> 兔n</a>
        <a class="profile-link" href="https://www.anime-planet.com/users/cheob" target="_blank" rel="noreferrer">cheob's library <span aria-hidden="true">↗</span></a>
      </header>

      <section class="hero" id="top">
        <p class="eyebrow">a little reading compass</p>
        <h1>your <em>shelf.</em></h1>

        <form class="search-panel" id="search-form">
          <label for="title-search">What are you looking for?</label>
          <div class="search-row">
            <input id="title-search" name="title" type="search" placeholder="search a title or author…" autocomplete="off" />
            <button type="submit">Search <span aria-hidden="true">→</span></button>
          </div>
          <div class="search-results" id="search-results" hidden></div>
        </form>
      </section>

      <section class="dashboard" aria-label="Reading dashboard">
        <article class="next-card">
          <div>
            <p class="eyebrow">Pick up next</p>
            <h2 id="next-title">Your queue is waiting</h2>
            <p id="next-meta">Add a title below and it will appear here.</p>
          </div>
          <button class="text-button" id="continue-reading" type="button" disabled>Open search <span aria-hidden="true">↗</span></button>
        </article>
        <div class="stats" aria-label="Library statistics">
          <div><strong id="reading-count">0</strong><span>reading</span></div>
          <div><strong id="queue-count">0</strong><span>in queue</span></div>
          <div><strong id="done-count">0</strong><span>finished</span></div>
        </div>
      </section>

      <section class="section-heading">
        <p class="eyebrow">your shelf</p>
        <div class="shelf-actions">
          <label class="import-btn" for="import-file">↑ import</label>
          <input type="file" id="import-file" accept=".json" hidden />
          <button class="add-button" id="show-add" type="button">+ add</button>
        </div>
      </section>

      <form class="add-form" id="add-form" hidden>
        <div class="field title-field"><label for="toon-title">Title</label><input id="toon-title" required placeholder="e.g. The Greatest Estate Developer" /></div>
        <div class="field"><label for="toon-status">Status</label><select id="toon-status"><option value="reading">Reading</option><option value="queue">Queue</option><option value="finished">Finished</option></select></div>
        <div class="field"><label for="toon-progress">Chapter</label><input id="toon-progress" type="number" min="0" value="0" /></div>
        <div class="field"><label for="toon-mood">Mood</label><select id="toon-mood"><option>Action</option><option>Romance</option><option>Fantasy</option><option>Comedy</option><option>Drama</option><option>Cozy</option><option>Horror</option></select></div>
        <button type="submit">Save</button>
      </form>

      <div class="filters" role="group" aria-label="Filter your library">
        <button class="filter active" data-filter="all" type="button">All <span id="all-total">0</span></button>
        <button class="filter" data-filter="reading" type="button">Reading</button>
        <button class="filter" data-filter="queue" type="button">Queue</button>
        <button class="filter" data-filter="finished" type="button">Finished</button>
      </div>
      <section class="library" id="library" aria-live="polite"></section>

      <section class="discover">
        <div class="discover-intro">
          <p class="eyebrow">discover</p>
          <h2>picks</h2>
        </div>
        <div class="recommendations" id="recommendations"></div>
      </section>
    </main>

    <template id="toon-template">
      <article class="toon-card">
        <div class="toon-icon" aria-hidden="true"></div>
        <div class="toon-details"><div class="card-title-row"><h3></h3><button class="delete" type="button" aria-label="Remove title">×</button></div><p class="toon-subtitle"></p><div class="card-controls"><select class="status-select" aria-label="Reading status"><option value="reading">Reading</option><option value="queue">Queue</option><option value="finished">Finished</option></select><label class="chapter-label">Ch. <input class="chapter-input" type="number" min="0" /></label><button class="open-search" type="button">Find <span aria-hidden="true">↗</span></button></div></div>
      </article>
    </template>

    <footer>兔n</footer>
    <script src="app.js"></script>
  </body>
</html>
