<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Webtoon Manager</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <h1>📖 Webtoon Manager</h1>
            <p class="tagline">Discover & manage your favorite webtoons</p>
        </header>

        <!-- Search Section -->
        <section class="search-section">
            <div class="search-bar-wrapper">
                <input 
                    type="text" 
                    id="searchInput" 
                    class="search-bar" 
                    placeholder="Search for a webtoon title..."
                    autocomplete="off"
                >
                <button id="searchBtn" class="search-btn">Search</button>
            </div>
            
            <!-- Platform Filter -->
            <div class="platform-filter">
                <label>Search on:</label>
                <div class="filter-options">
                    <label class="filter-checkbox">
                        <input type="checkbox" value="all" checked> All Platforms
                    </label>
                    <label class="filter-checkbox">
                        <input type="checkbox" value="anime-planet"> Anime-Planet
                    </label>
                    <label class="filter-checkbox">
                        <input type="checkbox" value="atsu"> Atsu.moe
                    </label>
                    <label class="filter-checkbox">
                        <input type="checkbox" value="kagane"> Kagane.to
                    </label>
                    <label class="filter-checkbox">
                        <input type="checkbox" value="comix"> Comix.to
                    </label>
                </div>
            </div>
        </section>

        <!-- Loading Indicator -->
        <div id="loadingIndicator" class="loading" style="display: none;">
            <div class="spinner"></div>
            <p>Searching...</p>
        </div>

        <!-- Results Section -->
        <section id="resultsSection" class="results-section">
            <h2>Search Results</h2>
            <div id="resultsList" class="results-list">
                <p class="empty-state">Enter a webtoon title to search</p>
            </div>
        </section>

        <!-- Library Section -->
        <section class="library-section">
            <h2>My Library</h2>
            <div id="libraryList" class="library-list">
                <p class="empty-state">Your library will appear here once integrated</p>
            </div>
        </section>
    </div>

    <script src="script.js"></script>
</body>
</html>
